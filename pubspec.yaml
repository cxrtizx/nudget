name: nudget
description: Cross-platform expense tracker with automatic notification parsing and classification.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.5

  # Local persistence
  sqflite: ^2.3.3
  path: ^1.9.0

  # Charts
  fl_chart: ^0.68.0

  # Notification listener (Android only)
  flutter_notification_listener: ^1.4.0

  # Immutable models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.20.2

  # Preferences (persists the user-chosen locale)
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.9
  freezed: ^2.5.2
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0

  # SQLite in-memory driver for desktop test execution
  sqflite_common_ffi: ^2.3.3

  # Linting
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  # Activates flutter gen-l10n; reads l10n.yaml for configuration.
  generate: true
